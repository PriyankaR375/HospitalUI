<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeCare Hospital</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #eef4ff;
}

/* Navbar */
header {
  position: sticky;
  top: 0;
  padding: 15px 50px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(90deg, #00b4db, #6a11cb);
  color: white;
}

nav a {
  color: white;
  margin-left: 25px;
  text-decoration: none;
  font-weight: 500;
  transition: 0.3s;
}

nav a:hover {
  color: #ffd700;
}

/* Hero */
.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 80px 60px;
  background: linear-gradient(120deg, #00b4db, #6a11cb);
  color: white;
  flex-wrap: wrap;
}

.hero-text {
  max-width: 500px;
}

.hero h2 {
  font-size: 42px;
}

.hero p {
  margin: 20px 0;
  font-size: 18px;
}

.hero img {
  width: 400px;
  border-radius: 20px;
}

.btn {
  background: white;
  color: #6a11cb;
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: #ffd700;
}

/* Sections */
section {
  padding: 70px 30px;
  text-align: center;
}

.section-title {
  font-size: 34px;
  margin-bottom: 40px;
  color: #6a11cb;
}

/* Cards */
.cards {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 30px;
}

.card {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(12px);
  padding: 30px;
  width: 260px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-12px) scale(1.03);
}

.card i {
  font-size: 40px;
  color: #6a11cb;
  margin-bottom: 15px;
}

/* Appointment */
form {
  max-width: 450px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 12px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  background: linear-gradient(90deg, #00b4db, #6a11cb);
  color: white;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

/* Contact */
.contact {
  background: linear-gradient(90deg, #00b4db, #6a11cb);
  color: white;
}

.contact p {
  font-size: 18px;
  margin: 10px 0;
}

/* Footer */
footer {
  background: #2c2c54;
  color: white;
  padding: 15px;
  text-align: center;
}

/* Responsive */
@media(max-width: 768px) {
  .hero {
    flex-direction: column;
    text-align: center;
  }

  .hero img {
    margin-top: 20px;
    width: 100%;
  }

  nav {
    display: none;
  }
}
</style>
</head>

<body>

<header>
  <h1><i class="fa-solid fa-hospital"></i> LifeCare</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#services">Services</a>
    <a href="#doctors">Doctors</a>
    <a href="#appointment">Appointment</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- Hero -->
<div class="hero">
  <div class="hero-text">
    <h2>Quality Care For Better Health</h2>
    <p>Trusted doctors, advanced treatment, and compassionate care.</
